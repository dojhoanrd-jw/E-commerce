<div class="page">
  <div class="page-head">
    <h1>Mis ventas</h1>
    <a class="btn-cta" routerLink="/seller/products">Mis productos</a>
  </div>

  @if (loading()) {
    <p class="muted">Cargando…</p>
  } @else {
    @if (data(); as d) {
      <div class="stats">
        <div class="stat">
          <div class="stat__value">{{ d.productsCount }}</div>
          <div class="stat__label">Productos</div>
        </div>
        <div class="stat">
          <div class="stat__value">{{ d.unitsSold }}</div>
          <div class="stat__label">Unidades vendidas</div>
        </div>
        <div class="stat">
          <div class="stat__value">{{ d.revenue | currency }}</div>
          <div class="stat__label">Ingresos</div>
        </div>
      </div>

      <h2 class="section-title">Ingresos por mes</h2>
      <div class="chart-card">
        <app-bar-chart [data]="monthData()" format="currency" />
      </div>

      <h2 class="section-title">Productos más vendidos</h2>
      <div class="chart-card">
        <app-bar-chart [data]="topData()" format="number" />
      </div>
    }
  }
</div>
