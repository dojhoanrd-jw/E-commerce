<div class="page" style="max-width: 580px;">
  <a class="back" routerLink="/seller/products">← Volver a mis productos</a>
  <h1>{{ editId() ? 'Editar producto' : 'Nuevo producto' }}</h1>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label class="field">
      <span>Nombre</span>
      <input type="text" formControlName="name" placeholder="Nombre del producto" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="field__error">El nombre es obligatorio</small>
      }
    </label>

    <label class="field">
      <span>Descripción</span>
      <textarea formControlName="description" rows="3" placeholder="Describe el producto"></textarea>
    </label>

    <div class="form-row">
      <label class="field">
        <span>Precio</span>
        <input type="number" min="0" step="0.01" formControlName="price" />
      </label>
      <label class="field">
        <span>Stock</span>
        <input type="number" min="0" formControlName="stock" />
      </label>
    </div>

    <label class="field">
      <span>Precio de oferta (opcional)</span>
      <input type="number" min="0" step="0.01" formControlName="salePrice" placeholder="Déjalo en 0 si no hay oferta" />
    </label>

    <label class="field">
      <span>Categoría</span>
      <select formControlName="category">
        @for (c of categories; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </label>

    <label class="field">
      <span>URL de imagen principal</span>
      <input type="text" formControlName="imageurl" placeholder="https://…" />
      @if (form.controls.imageurl.touched && form.controls.imageurl.invalid) {
        <small class="field__error">La imagen es obligatoria</small>
      }
    </label>

    <label class="field">
      <span>Galería (una URL por línea, opcional)</span>
      <textarea formControlName="imagesText" rows="3" placeholder="https://…&#10;https://…"></textarea>
    </label>

    <div class="field">
      <span>Variantes (talla / color, opcional)</span>
      <small style="color: var(--color-muted); display: block; margin-bottom: 0.5rem;">
        Si agregas variantes, el stock se maneja por cada una.
      </small>

      @for (variant of variants.controls; track $index) {
        <div [formGroup]="$any(variant)" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <input type="text" formControlName="size" placeholder="Talla" style="flex: 1; padding: 0.6rem; border: 1.5px solid var(--color-border); border-radius: 10px; font-family: inherit;" />
          <input type="text" formControlName="color" placeholder="Color" style="flex: 1; padding: 0.6rem; border: 1.5px solid var(--color-border); border-radius: 10px; font-family: inherit;" />
          <input type="number" min="0" formControlName="stock" placeholder="Stock" style="width: 90px; padding: 0.6rem; border: 1.5px solid var(--color-border); border-radius: 10px; font-family: inherit;" />
          <button type="button" (click)="removeVariant($index)" aria-label="Quitar" style="border: 0; background: transparent; color: var(--color-error); font-size: 1.3rem; cursor: pointer;">&times;</button>
        </div>
      }

      <button type="button" class="link" (click)="addVariant()">+ Agregar variante</button>
    </div>

    <button class="btn" type="submit" [disabled]="saving()">
      {{ saving() ? 'Guardando…' : (editId() ? 'Guardar cambios' : 'Crear producto') }}
    </button>
  </form>
</div>
