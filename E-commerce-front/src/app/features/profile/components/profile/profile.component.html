<div class="page">
  <h1>Mi perfil</h1>

  @if (user(); as u) {
    <div class="profile">
      <div class="profile__card">
        <div class="avatar">{{ initials() }}</div>
        <div class="profile__id">
          <strong>{{ u.name }}</strong>
          <span class="profile__email">{{ u.email }}</span>
          <span class="role-badge">{{ roleLabel(u.role) }}</span>
        </div>
      </div>

      <div class="profile__details">
        <div class="profile__row">
          <span>Nombre</span>
          <strong>{{ u.name }}</strong>
        </div>
        <div class="profile__row">
          <span>Correo</span>
          <strong>{{ u.email }}</strong>
        </div>
        <div class="profile__row">
          <span>Tipo de cuenta</span>
          <strong>{{ roleLabel(u.role) }}</strong>
        </div>
      </div>

      <div class="profile__actions">
        <a class="btn-cta" routerLink="/orders">Ver mis compras</a>
        <button class="logout-btn" type="button" (click)="logout()">Cerrar sesión</button>
      </div>
    </div>
  }
</div>
